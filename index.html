<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Recap</title>
</head>
<body>
    <nav style="text-align: center;">
        <a href="https://www.maxxfitnessclubzz.com/" target="_blank">My Gym</a>
        <a href="https://www.rottentomatoes.com/m/blood_diamond">Favorite Movie</a>
    </nav>

    <h1>You can use the following form to list a few of your favorites!</h1>
   <div>
       <form>
         <fieldset>
             <legend>Hobbies</legend>
             <p>
                <input type="checkbox" name="hobbies" id="gym" value="gym" />
                <label for="gym">Gym</label>
            </p>
            <p>
                <input type="checkbox" name="hobbies" id="sport Events" value="sport Events" />
                <label for="sports Events">Sport Events</label>
            </p>
            <p>
                <input type="checkbox" name="hobbies" id="shopping" value="shopping" />
                <label for="shopping">Shopping</label>
            </p>
            <p>
                <input type="checkbox" name="hobbies" id="movies" value="movies" />
                <label for="movies">Movies</label>
            </p>
            <p>
                <input type="checkbox" name="hobbies" id="hiking" value="hiking" />
                <label for="hiking">Hiking</label>
            </p>
            <p>
                <input type="checkbox" name="hobbies" id="nightlife" value="nightlife" />
                <label for="nightlife">Nightlife</label>
            </p>
         </fieldset>
       </form>
   </div> 
   <br/>
   <h2>The Cascade Mountains: My favorite place to go hiking.</h2>
   <iframe src="https://www.youtube.com/embed/duGVGKvyKiI"
      frameborder="2px"
      width="560" height="315"
      allowfullscreen>
  </iframe>
</body>
</html>
